<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#113658,#243b47);
    color:white;
    text-align:center;
}

.container{
    animation:fade 1.2s ease;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

p{
    opacity:0.9;
}

.btn{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#1f4e79;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>👋 HALLO</h1>
    <p>Welcome, View Here!</p>

    <button class="btn" onclick="location.href='portofolio.html'">
        Masuk ke Portofolio →
    </button>
</div>

</body>
</html>
